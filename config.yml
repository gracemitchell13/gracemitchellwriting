backend:
  name: github
  repo: gracemitchell13/gracemitchellwriting
  branch: main
  auth_type: pkce

# Where uploaded images get stored
media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "posts"
    label: "Blog Posts"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
        hint: "The post headline."

      - label: "Date"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "MMMM D, YYYY"
        time_format: false

      - label: "Tag"
        name: "tag"
        widget: "select"
        required: false
        options:
          - "Civic Tech"
          - "Housing Policy"
          - "AI & Tools"
          - "Government Digital Services"
          - "Grant Management"
          - "Career"
          - "Personal"

      - label: "Summary"
        name: "summary"
        widget: "text"
        hint: "One or two sentences shown on the blog listing page."

      - label: "Body"
        name: "body"
        widget: "markdown"

      - label: "Layout"
        name: "layout"
        widget: "hidden"
        default: "post"
